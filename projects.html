<script>
const hoverImage = document.getElementById("hoverImage");

let mouseX = 0;
let mouseY = 0;
let ghostX = 0;
let ghostY = 0;

// track mouse
document.addEventListener("mousemove", (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
});

// ghost lag animation
function animate() {
    ghostX += (mouseX - ghostX) * 0.08;
    ghostY += (mouseY - ghostY) * 0.08;

    hoverImage.style.left = ghostX + "px";
    hoverImage.style.top = ghostY + "px";

    requestAnimationFrame(animate);
}
animate();

// hover behavior
document.querySelectorAll("a[data-image]").forEach(link => {

    link.addEventListener("mouseenter", () => {
        hoverImage.src = link.getAttribute("data-image");

        setTimeout(() => {
            hoverImage.style.opacity = 0.6;
        }, 80);
    });

    link.addEventListener("mouseleave", () => {
        hoverImage.style.opacity = 0;
    });
});
</script>
